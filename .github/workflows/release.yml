name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            artifact: plus-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            artifact: plus-x86_64-apple-darwin.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            artifact: plus-aarch64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            artifact: plus-x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Package Unix
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist/plus-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/plus dist/plus-${{ matrix.target }}/
          cp target/${{ matrix.target }}/release/cargo-plus dist/plus-${{ matrix.target }}/
          cp README.md LICENSE-MIT LICENSE-APACHE dist/plus-${{ matrix.target }}/
          tar -C dist -czf ${{ matrix.artifact }} plus-${{ matrix.target }}
      - name: Package Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/plus-${{ matrix.target }}
          Copy-Item target/${{ matrix.target }}/release/plus.exe dist/plus-${{ matrix.target }}/
          Copy-Item target/${{ matrix.target }}/release/cargo-plus.exe dist/plus-${{ matrix.target }}/
          Copy-Item README.md,LICENSE-MIT,LICENSE-APACHE dist/plus-${{ matrix.target }}/
          Compress-Archive -Path dist/plus-${{ matrix.target }} -DestinationPath ${{ matrix.artifact }}
      - name: Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
