name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format
        run: cargo fmt --check
      - name: Check
        run: cargo check --locked
      - name: Test
        run: cargo test --locked
      - name: Package
        run: cargo package --locked
